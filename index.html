<!DOCTYPE html>
<html lang="th">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Love</title>

    <style>

        html, body {
            height: 100%;
            background: #000; overflow: hidden;
            font-family: 'JetBrains Mono', ui-monospace, monospace;
        }
        #bg-canvas {
            position: fixed; inset: 0;
            width: 100vw; height: 100vh;
            display: block; z-index: 0; cursor: grab;
        }
        #bg-canvas:active { cursor: grabbing; }

        :root {
            --start-ink: #f8f4ff; --start-mist: #d8cbff;
            --start-accent: #ff69b4; --start-accent-2: #ff85c2;
            --start-panel: rgba(40,5,30,0.62); --start-stroke: rgba(255,255,255,0.24);
        }

        #start-overlay {
            position: fixed; inset: 0; z-index: 20;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            background:
                radial-gradient(70% 55% at 15% 100%, rgba(255,105,180,0.2), transparent 68%),
                radial-gradient(60% 45% at 90% 10%, rgba(255,130,185,0.24), transparent 70%),
                radial-gradient(120% 100% at 50% 50%, rgba(80,0,50,0.8), rgba(20,0,15,0.98));
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #start-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        #start-overlay::before, #start-overlay::after {
            content: ""; position: absolute;
            width: 46vmax; height: 46vmax;
            border-radius: 50%; filter: blur(40px);
            pointer-events: none; opacity: 0.32;
            animation: startDrift 8s ease-in-out infinite;
        }
        #start-overlay::before {
            left: -12vmax; bottom: -18vmax;
            background: radial-gradient(circle, rgba(255,105,180,0.75), transparent 65%);
        }
        #start-overlay::after {
            right: -15vmax; top: -15vmax;
            background: radial-gradient(circle, rgba(255,130,185,0.72), transparent 66%);
            animation-delay: -4s;
        }

        #start-card {
            position: relative; z-index: 2; text-align: center;
            color: var(--start-ink); width: min(92vw, 480px);
            padding: clamp(16px,4vw,28px);
            animation: cardFloat 4.5s ease-in-out infinite;
        }
        #start-gif {
            width: clamp(170px,32vw,260px); height: clamp(170px,32vw,260px);
            object-fit: cover; border-radius: 50%;
            margin: 12px auto 16px; display: block; border: 0; background: transparent;
            -webkit-mask-image: radial-gradient(circle at center, #000 62%, transparent 100%);
            mask-image: radial-gradient(circle at center, #000 62%, transparent 100%);
            box-shadow: 0 10px 26px rgba(0,0,0,0.4), 0 0 18px rgba(255,105,180,0.2);
        }

        .start-photo-frame {
            width: clamp(92px, 20vw, 136px);
            height: clamp(92px, 20vw, 136px);
            margin: 0 auto 18px;
            border-radius: 50%;
            padding: 4px;
            background: conic-gradient(from 0deg, #ff69b4, #ffd9ec, #ff85c2, #ff69b4);
            box-shadow: 0 14px 34px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.15);
            animation: cardFloat 5s ease-in-out infinite;
        }
        #start-photo {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            background: #200014;
            transition: opacity 0.5s ease;
        }
        #start-card h1 {
            margin: 0 0 14px;
            font-family: 'Anuphan', 'Helvetica Neue', sans-serif;
            font-size: clamp(34px,8vw,78px); line-height: 0.95;
            letter-spacing: 0.03em; text-wrap: balance;
            text-shadow: 0 0 20px rgba(255,105,180,0.46), 0 0 42px rgba(255,130,185,0.32);
        }
        #start-card p {
            margin: 0 0 26px; color: rgba(255,220,240,0.9);
            font-size: clamp(13px,2.5vw,16px);
            letter-spacing: 0.12em; text-transform: uppercase;
        }
        #start-button {
            border: 1px solid rgba(255,202,229,0.72);
            background: linear-gradient(140deg, #ff69b4, #e0508a);
            color: #fff; padding: 13px 34px; border-radius: 999px;
            font-size: 13px; font-weight: 700; letter-spacing: 0.2em;
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 8px 24px rgba(255,105,180,0.35), inset 0 1px 0 rgba(255,255,255,0.4);
            transition: transform 0.2s ease, background 0.3s ease, box-shadow 0.3s ease;
        }
        #start-button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 14px 34px rgba(255,130,185,0.32), 0 8px 28px rgba(255,105,180,0.42), inset 0 1px 0 rgba(255,255,255,0.5);
        }
        #start-button:focus-visible { outline: 2px solid rgba(255,255,255,0.95); outline-offset: 3px; }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px); }
            50%  { transform: translateY(-7px); }
        }
        @keyframes startDrift {
            0%, 100% { transform: scale(1) translateY(0); }
            50%  { transform: scale(1.08) translateY(-8px); }
        }
        @media (max-width: 640px) {
            #start-button { width: min(100%, 280px); }
        }

        #message-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, rgba(50,5,35,0.85), rgba(0,0,0,0.95));
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            z-index: 10; opacity: 0; pointer-events: none;
            transition: opacity 0.6s ease;
        }
        #message-overlay.show { opacity: 1; pointer-events: auto; }
        #message-card {
            max-width: 560px; padding: 48px 56px; text-align: center;
            transform: translateY(20px) scale(0.95);
            transition: transform 0.6s cubic-bezier(0.2,0.8,0.2,1);
            position: relative;
            background: linear-gradient(160deg, rgba(70,10,45,0.55), rgba(15,0,12,0.8));
            border: 1px solid rgba(255,150,190,0.25);
            border-radius: 32px;
            box-shadow: 0 24px 70px rgba(0,0,0,0.55), 0 0 70px rgba(255,105,180,0.18), inset 0 1px 0 rgba(255,255,255,0.06);
            -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
        }
        #message-overlay.show #message-card { transform: translateY(0) scale(1); }
        #message-image-wrap {
            position: relative;
            width: 100%;
            max-width: 380px;
            aspect-ratio: 3 / 4;
            margin: 0 auto 24px;
            animation: floaty 4s ease-in-out infinite;
        }
        #message-image-bg {
            position: absolute;
            inset: -28px;
            width: calc(100% + 56px);
            height: calc(100% + 56px);
            object-fit: cover;
            filter: blur(28px) brightness(0.55) saturate(1.4);
            opacity: 0.75;
            border-radius: 32px;
            z-index: 0;
        }
        #message-image {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            border: 1px solid rgba(255,180,210,0.35);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 40px rgba(255,105,180,0.4);
        }
        @keyframes floaty {
            0%, 100% { transform: translateY(0); }
            50%  { transform: translateY(-10px); }
        }
        #message-title {
            font-size: 28px; font-weight: 700; color: #fff;
            margin: 0 0 20px; letter-spacing: 0.05em;
            text-shadow: 0 0 20px rgba(255,105,180,0.7);
            font-family: 'Anuphan', 'Helvetica Neue', sans-serif; font-style: italic;
        }
        #message-text {
            font-size: 18px; line-height: 1.7;
            color: rgba(255,220,240,0.95);
            margin: 0 0 32px; font-family: 'Anuphan', 'Helvetica Neue', sans-serif; text-wrap: pretty;
        }
        #message-close {
            background: transparent;
            border: 1px solid rgba(255,150,190,0.5);
            color: rgba(255,200,230,0.9); padding: 10px 28px;
            font-family: 'Anuphan', 'Helvetica Neue', sans-serif; font-size: 12px;
            letter-spacing: 0.2em; border-radius: 999px; cursor: pointer;
            transition: all 0.3s;
        }
        #message-close:hover {
            background: rgba(255,105,180,0.2);
            border-color: rgba(255,150,190,0.9); color: #fff;
        }
        #message-card::before {
            content: '❤️'; position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%); font-size: 24px;
            color: rgba(255,105,180,0.8);
            animation: sparkle 2s ease-in-out infinite;
        }
        @keyframes sparkle {
            0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(1); }
            50%  { opacity: 1; transform: translateX(-50%) scale(1.2); }
        }

        /* sticker gif */
        #sticker-wrap {
            margin: 0 auto 16px;
            width: 140px; height: 140px;
        }
        #sticker-gif {
            width: 100%; height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 16px rgba(255,105,180,0.9));
            animation: stickerBounce 1s ease-in-out infinite alternate;
        }
        @keyframes stickerBounce {
            from { transform: translateY(0) scale(1); }
            to   { transform: translateY(-10px) scale(1.08); }
        }

        /* countdown */
        #countdown-wrap {
            margin: 0 auto 20px;
            text-align: center;
        }
        #countdown-display {
            display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
        }
        .cd-box {
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255,105,180,0.12);
            border: 1px solid rgba(255,105,180,0.35);
            border-radius: 12px; padding: 10px 16px; min-width: 62px;
        }
        .cd-num {
            font-size: 32px; font-weight: 700; line-height: 1;
            color: #fff;
            text-shadow: 0 0 16px rgba(255,105,180,1), 0 0 32px rgba(255,105,180,0.6);
            font-family: 'JetBrains Mono', monospace;
        }
        .cd-label {
            font-size: 10px; letter-spacing: 0.15em; color: rgba(255,180,210,0.8);
            margin-top: 4px; text-transform: uppercase;
        }
        .cd-title {
            font-size: 13px; letter-spacing: 0.2em; color: rgba(255,200,230,0.9);
            margin-bottom: 12px; text-transform: uppercase;
        }

        /* letter effect */
        #message-card.effect-letter #message-image-wrap {
            border: 2px solid rgba(255,150,190,0.6);
            box-shadow: 0 0 30px rgba(255,105,180,0.5), inset 0 0 20px rgba(255,105,180,0.1);
            animation: floaty 4s ease-in-out infinite, letterGlow 2s ease-in-out infinite;
        }
        @keyframes letterGlow {
            0%,100% { box-shadow: 0 0 20px rgba(255,105,180,0.4); }
            50%     { box-shadow: 0 0 50px rgba(255,105,180,0.9), 0 0 80px rgba(255,150,200,0.4); }
        }

        /* jigsaw popup */
        #jigsaw-overlay {
            position: fixed; inset: 0; z-index: 30;
            background: radial-gradient(ellipse at center, rgba(30,0,20,0.97), rgba(0,0,0,0.99));
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #jigsaw-overlay.show { opacity: 1; pointer-events: auto; }
        #jigsaw-title {
            font-family: 'Anuphan', 'Helvetica Neue', sans-serif; font-size: 20px; color: rgba(255,200,230,0.9);
            letter-spacing: 0.15em; margin-bottom: 4px;
        }
        #jigsaw-hint {
            font-size: 12px; color: rgba(255,150,190,0.6);
            letter-spacing: 0.1em; margin-bottom: 8px;
        }
        #jigsaw-board {
            position: relative;
            border: 1px solid rgba(255,105,180,0.3);
            border-radius: 12px;
            overflow: visible;
            box-shadow: 0 0 40px rgba(255,105,180,0.3);
            cursor: default;
            touch-action: none;
        }
        #jigsaw-board-ghost {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; border-radius: 12px;
            opacity: 0.16; pointer-events: none;
        }
        .jigsaw-piece {
            position: absolute !important;
            cursor: grab;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.65));
            transition: transform 0.35s ease, filter 0.2s;
            touch-action: none;
            user-select: none;
        }
        .jigsaw-piece:active { cursor: grabbing; filter: drop-shadow(0 10px 24px rgba(255,105,180,0.85)); }
        .jigsaw-piece.locked { cursor: default; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.35)); }
        #jigsaw-progress {
            font-size: 12px; color: rgba(255,180,210,0.8); letter-spacing: 0.1em;
        }
        #jigsaw-reveal {
            max-width: 420px; text-align: center; padding: 0 24px;
            display: none;
        }
        #jigsaw-reveal h2 {
            font-family: 'Anuphan', 'Helvetica Neue', sans-serif; font-size: 22px; color: #fff;
            text-shadow: 0 0 20px rgba(255,105,180,0.8); margin-bottom: 12px;
        }
        #jigsaw-reveal p {
            font-size: 16px; line-height: 1.7; color: rgba(255,235,240,0.95);
            font-family: 'Anuphan', 'Helvetica Neue', sans-serif; margin-bottom: 20px;
        }
        #jigsaw-close {
            background: transparent;
            border: 1px solid rgba(255,150,190,0.5);
            color: rgba(255,220,230,0.9); padding: 10px 28px;
            font-family: 'Anuphan', 'Helvetica Neue', sans-serif; font-size: 12px;
            letter-spacing: 0.2em; border-radius: 999px; cursor: pointer;
            transition: all 0.3s;
        }
        #jigsaw-close:hover { background: rgba(255,105,180,0.2); color: #fff; }
        @keyframes jigsawPop {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        .jigsaw-piece.snap-anim { animation: jigsawPop 0.25s ease; }

        /* fortune card */
        #fortune-overlay {
            position: fixed; inset: 0; z-index: 30;
            background: radial-gradient(ellipse at center, rgba(30,0,25,0.97), rgba(0,0,0,0.99));
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 14px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
            padding: 16px; overflow-y: auto;
        }
        #fortune-overlay.show { opacity: 1; pointer-events: auto; }
        #fortune-title {
            font-family: 'Georgia', serif; font-size: clamp(18px, 5vw, 24px);
            color: #fff; text-shadow: 0 0 20px rgba(255,105,180,0.8);
            letter-spacing: 0.1em;
        }
        #fortune-subtitle {
            font-size: clamp(11px, 3vw, 13px); color: rgba(255,180,210,0.7);
            letter-spacing: 0.08em; text-align: center;
        }
        #fortune-cards {
            display: flex; gap: 12px; flex-wrap: wrap;
            justify-content: center; padding: 10px;
            max-width: 100vw;
        }
        .fortune-card {
            width: clamp(90px, 22vw, 130px);
            height: clamp(130px, 32vw, 190px);
            perspective: 800px; cursor: pointer;
            flex-shrink: 0;
        }
        .fortune-card-inner {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.4,0.2,0.2,1);
        }
        .fortune-card.flipped .fortune-card-inner { transform: rotateY(180deg); }
        .fortune-card.disabled { cursor: default; opacity: 0.5; filter: grayscale(0.5); }
        .fortune-front, .fortune-back {
            position: absolute; inset: 0;
            border-radius: 14px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 12px; text-align: center;
        }
        .fortune-card { --card-hue: 330; }
        .fortune-back {
            position: absolute; inset: 0; border-radius: 14px;
            background:
                radial-gradient(circle at 1px 1px, hsla(var(--card-hue),80%,75%,0.10) 1px, transparent 0) 0 0/16px 16px,
                linear-gradient(135deg, hsl(var(--card-hue) 65% 14%), hsl(calc(var(--card-hue) + 20) 60% 8%));
            border: 1px solid hsla(var(--card-hue),85%,70%,0.4);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .fortune-back::before, .fortune-back::after {
            content: '?'; position: absolute;
            font-family: 'Georgia', serif; font-size: 13px;
            color: hsla(var(--card-hue),80%,80%,0.45);
            border: 1px solid hsla(var(--card-hue),80%,80%,0.35);
            width: 18px; height: 18px; border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
        }
        .fortune-back::before { top: 8px; left: 8px; }
        .fortune-back::after  { bottom: 8px; right: 8px; transform: rotate(180deg); }
        .fortune-back-pattern {
            font-size: 32px; opacity: 0.6;
            color: hsl(var(--card-hue) 90% 80%);
            animation: cardPulse 2s ease-in-out infinite;
        }
        @keyframes cardPulse {
            0%,100% { transform: scale(1); opacity: 0.5; }
            50%      { transform: scale(1.1); opacity: 0.8; }
        }
        .fortune-front {
            background: linear-gradient(135deg, hsl(var(--card-hue) 65% 18%), hsl(calc(var(--card-hue) + 20) 60% 10%));
            border: 1.5px solid hsla(var(--card-hue),85%,70%,0.7);
            box-shadow: 0 0 30px hsla(var(--card-hue),85%,60%,0.4), inset 0 1px 0 rgba(255,255,255,0.12);
            transform: rotateY(180deg);
        }
        .fortune-label {
            font-size: clamp(8px, 2vw, 9px); letter-spacing: 0.18em;
            color: hsla(var(--card-hue),80%,85%,0.65);
            margin-bottom: 6px; text-transform: uppercase;
        }
        .fortune-emoji { font-size: clamp(28px, 8vw, 40px); margin-bottom: 6px; }
        .fortune-text {
            font-size: clamp(10px, 2.8vw, 12px); line-height: 1.5;
            color: rgba(255,230,240,0.95);
            font-family: 'Georgia', serif;
        }
        .fortune-card:not(.flipped):not(.disabled):hover .fortune-card-inner {
            transform: rotateY(20deg) translateY(-6px);
        }

        /* mystery shake */
        @keyframes fortuneShake {
            0%,100% { transform: translateX(0) rotate(0deg); }
            15%  { transform: translateX(-4px) rotate(-1.5deg); }
            30%  { transform: translateX(4px)  rotate(1.5deg); }
            45%  { transform: translateX(-3px) rotate(-1deg); }
            60%  { transform: translateX(3px)  rotate(1deg); }
            75%  { transform: translateX(-2px) rotate(-0.5deg); }
        }
        .fortune-card.shaking { animation: fortuneShake 0.5s ease; }

        /* reveal overlay */
        #fortune-reveal-overlay {
            position: fixed; inset: 0; z-index: 40;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85);
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #fortune-reveal-overlay.show { opacity: 1; pointer-events: auto; }
        #fortune-reveal-card {
            --card-hue: 330;
            width: min(85vw, 340px);
            background: linear-gradient(135deg, hsl(var(--card-hue) 65% 18%), hsl(calc(var(--card-hue) + 20) 60% 10%));
            border: 1.5px solid hsla(var(--card-hue),85%,70%,0.8);
            border-radius: 20px; padding: 36px 28px;
            text-align: center;
            box-shadow: 0 0 60px hsla(var(--card-hue),85%,60%,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            transform: scale(0.4);
            transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), background 0.3s ease, border-color 0.3s ease;
        }
        #fortune-reveal-overlay.show #fortune-reveal-card { transform: scale(1); }
        .frev-emoji {
            font-size: 48px; display: block;
            opacity: 0; transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .frev-text-line {
            display: block; font-size: clamp(14px,4vw,18px);
            color: rgba(255,230,240,0.95); font-family: 'Georgia', serif;
            line-height: 1.6; margin-top: 8px;
            opacity: 0; transform: translateY(12px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .frev-btn {
            margin-top: 24px; display: inline-block;
            background: transparent;
            border: 1px solid rgba(255,150,190,0.5);
            color: rgba(255,220,230,0.9); padding: 10px 28px;
            font-family: 'JetBrains Mono', monospace; font-size: 12px;
            letter-spacing: 0.2em; border-radius: 999px; cursor: pointer;
            transition: all 0.3s;
            opacity: 0; transform: translateY(12px);
            transition: opacity 0.4s ease, transform 0.4s ease, background 0.3s, color 0.3s;
        }
        .frev-btn:hover { background: rgba(255,105,180,0.2); color: #fff; }
        #fortune-replay, #fortune-close {
            background: transparent;
            border: 1px solid rgba(255,150,190,0.5);
            color: rgba(255,220,230,0.9); padding: 10px 28px;
            font-family: 'Anuphan', 'Helvetica Neue', sans-serif; font-size: 12px;
            letter-spacing: 0.2em; border-radius: 999px; cursor: pointer;
            transition: all 0.3s;
        }
        #fortune-replay:hover, #fortune-close:hover {
            background: rgba(255,105,180,0.2); color: #fff;
        }

        /* typewriter cursor */
        #message-text.typing::after {
            content: '|';
            animation: blink 0.7s step-end infinite;
            color: #ff85c2;
        }
        @keyframes blink { 50% { opacity: 0; } }

        #message-card.effect-stars {
            overflow: visible;
        }

        .music-control {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; align-items: center;
        }
        .music-btn {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #ff69b4, #e0508a);
            border: none; border-radius: 50%; cursor: pointer;

        function mulberry32(a) {
            return function() {
                a |= 0; a = a + 0x6D2B79F5 | 0;
                let t = a;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        window.makePlateCanvas = function(p, seed, size) {
            size = size || 512;
            const w = size, h = size;
            const cvs = document.createElement('canvas');
            cvs.width = w; cvs.height = h;
            const ctx = cvs.getContext('2d');
            const rng = mulberry32(seed * 9999);

            ctx.clearRect(0, 0, w, h);
            const bgGrad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w * 0.48);
            bgGrad.addColorStop(0, `hsla(${p.hue}, 90%, 35%, 0.7)`);
            bgGrad.addColorStop(0.5, `hsla(${p.hue}, 85%, 22%, 0.4)`);
            bgGrad.addColorStop(0.85, `hsla(${p.hue}, 80%, 15%, 0.05)`);
            bgGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, w, h);

            const c1 = `hsl(${p.hue}, 90%, 60%)`;
            const c2 = `hsl(${(p.hue + 10) % 360}, 85%, 70%)`;
            const c3 = `hsl(${(p.hue + 20) % 360}, 80%, 85%)`;
            const cx = w/2, cy = h/2;

            if (p.pattern === 'heart') {
                const heartPath = (scale) => {
                    ctx.beginPath();
                    for (let t = 0; t <= Math.PI * 2 + 0.05; t += 0.04) {
                        const x = 16 * Math.pow(Math.sin(t), 3);
                        const y = -(13 * Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
                        const px = cx + x * scale, py = cy + y * scale;
                        if (t === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                };
                for (let g = 8; g > 0; g--) { ctx.globalAlpha = 0.08; ctx.fillStyle = c2; heartPath(11 + g); ctx.fill(); }
                ctx.globalAlpha = 0.95;
                const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, w * 0.4);
                grad.addColorStop(0, c3); grad.addColorStop(0.6, c1); grad.addColorStop(1, `hsl(${p.hue}, 90%, 35%)`);
                ctx.fillStyle = grad; heartPath(13); ctx.fill();
                ctx.globalAlpha = 0.4; ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.ellipse(cx - 50, cy - 40, 36, 20, -0.3, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
            }

            for (let i = 0; i < 80; i++) {
                const x = rng() * w, y = rng() * h, r = rng() * 2 + 0.3;
                ctx.globalAlpha = rng() * 0.8 + 0.2; ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.globalCompositeOperation = 'destination-in';
            const alphaMask = ctx.createRadialGradient(cx, cy, w * 0.06, cx, cy, w * 0.47);
            alphaMask.addColorStop(0, 'rgba(255,255,255,1)');
            alphaMask.addColorStop(0.75, 'rgba(255,255,255,0.95)');
            alphaMask.addColorStop(0.9, 'rgba(255,255,255,0.25)');
            alphaMask.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = alphaMask; ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'source-over';
            return cvs;
        };

                accCol[i3] = pColor.r; accCol[i3+1] = pColor.g; accCol[i3+2] = pColor.b;

        const generateGalaxy = () => {
            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(parameters.count * 3);
            const colors    = new Float32Array(parameters.count * 3);
            const colorInside  = new THREE.Color(parameters.insideColor);
            const colorOutside = new THREE.Color(parameters.outsideColor);
            for (let i = 0; i < parameters.count; i++) {
                const i3 = i * 3;
                let radius = Math.random() * parameters.radius;
                if (radius < 1.2) radius += 1.2;
                const spinAngle   = radius * parameters.spin;
                const branchAngle = (i % parameters.branches) / parameters.branches * Math.PI * 2;
                const rX = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const rY = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                const rZ = Math.pow(Math.random(), parameters.randomnessPower) * (Math.random() < 0.5 ? 1 : -1) * parameters.randomness * radius;
                positions[i3]   = Math.cos(branchAngle + spinAngle) * radius + rX;
                positions[i3+1] = rY / 2;
                positions[i3+2] = Math.sin(branchAngle + spinAngle) * radius + rZ;
                const mixedColor = colorInside.clone();

                colors[i3] = mixedColor.r; colors[i3+1] = mixedColor.g; colors[i3+2] = mixedColor.b;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
            material = new THREE.PointsMaterial({ size: parameters.size, sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending, vertexColors: true });

        function createCenteredPlateTexture(src, fallbackCanvas) {
            const size = 1024;
            const cvs = document.createElement('canvas');
            cvs.width = size;
            cvs.height = size;
            const ctx = cvs.getContext('2d');
            ctx.drawImage(fallbackCanvas, 0, 0, size, size);

            const tex = new THREE.CanvasTexture(cvs);
            tex.anisotropy = 8;
            tex.needsUpdate = true;

            if (!src) return tex;

            const image = new Image();
            image.onload = () => {
                const scale = Math.max(size / image.width, size / image.height);
                const drawW = image.width * scale;
                const drawH = image.height * scale;
                const drawX = (size - drawW) / 2;
                const drawY = (size - drawH) / 2;
                ctx.clearRect(0, 0, size, size);
                ctx.drawImage(image, drawX, drawY, drawW, drawH);
                tex.needsUpdate = true;
            };
            image.src = src;
            return tex;
        }

        const textGroup = new THREE.Group();

        const ambientPhrases = ["YOU CAN DO THIS","KEEP GOING","BELIEVE IN U","STAY STRONG","YOU ARE ENOUGH", "ONE STEP AT A TIME", "YOU ARE LOVED", "BREATHE", "U GOT THIS","NEVER GIVE UP","SHINE ON","BE KIND TO URSELF","YOU MATTER","BRIGHTER DAYS "];

        if (points) points.visible = false;

        camera.position.set(40, 25, 50);

        const easeOutCubic = x => 1 - Math.pow(1 - x, 3);
        const easeOutBack  = x => { const c = 1.70158; return 1 + (c+1) * Math.pow(x-1,3) + c * Math.pow(x-1,2); };
        const smoothstep   = (a, b, x) => { const t = Math.min(1, Math.max(0,(x-a)/(b-a))); return t*t*(3-2*t); };
        const setPlateScale = (mesh, scale) => { mesh.scale.setScalar(scale); };

        const getExperienceTime = () => experienceStarted ? (performance.now() - experienceStartMs) / 1000 : 0;

        (function cycleStartPhoto() {

        const heartContainer = document.getElementById('heart-hold-container');

        function updateRunnerPosition() {

            const totalLength = heartFill.getTotalLength();

        // shatters the glass heart into small heart-shaped particles at (x, y)
        function shatterHeart(x, y) {
            const c = document.createElement('canvas');
            c.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;';
            document.body.appendChild(c);
            const ctx = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;

            const colors = ['#ff69b4', '#ff3366', '#ff85c2', '#fff0f8', '#e0a0ff'];
            const parts = Array.from({ length: 70 }, () => {
                const angle = Math.random() * Math.PI * 2;
                const speed = 3 + Math.random() * 8;
                return {
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    r: 3 + Math.random() * 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    opacity: 1,
                    gravity: 0.12,
                    tilt: Math.random() * 360,
                    tiltSpeed: 3 + Math.random() * 5
                };
            });

            function draw() {
                ctx.clearRect(0, 0, c.width, c.height);
                let alive = false;
                parts.forEach(p => {
                    if (p.opacity <= 0) return;
                    alive = true;
                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.tilt * Math.PI / 180);
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.opacity;
                    const s = p.r * 0.15;
                    ctx.beginPath();
                    for (let a = 0; a <= Math.PI * 2; a += 0.2) {
                        const hx = 16 * Math.pow(Math.sin(a), 3) * s;
                        const hy = -(13 * Math.cos(a) - 5 * Math.cos(2 * a) - 2 * Math.cos(3 * a) - Math.cos(4 * a)) * s;
                        a === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
                    }
                    ctx.fill();
                    ctx.restore();
                    p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
                    p.tilt += p.tiltSpeed; p.opacity -= 0.02;
                });
                if (alive) requestAnimationFrame(draw); else c.remove();
            }
            draw();
        }

        function startHolding(e) {
            e.preventDefault();

            startMusicAtIntro();

            clearInterval(holdTimer);
            holdInstruction.textContent = "Charging love...";

            updateRunnerPosition();

            holdTimer = setInterval(() => {
                if (progress < 100) {
                    progress += step;

                    heartFill.style.strokeDashoffset = offset;

                    heartIcon.style.opacity = 0.3 + (progress / 100) * 0.7;

        function stopHolding() {

        heartContainer.addEventListener('mousedown', startHolding);

        window.addEventListener('resize', () => {

        const tick = () => {
            const t = getExperienceTime();

            if (t < 9) {
                const p = easeOutCubic(Math.min(1, t / 9));
                camera.position.lerpVectors(new THREE.Vector3(40,25,50), new THREE.Vector3(3.5,2.5,6), p);
                controls.enabled = false;
            } else {
                controls.enabled = true;
                if (musicWrapper && musicWrapper.style.display !== 'flex') musicWrapper.style.display = 'flex';
            }

            if (hyperspaceGroup) {
                const introFadeIn  = smoothstep(0.1, 1.4, t);
                const introFadeOut = 1 - smoothstep(3.4, 5.0, t);
                const strength = introFadeIn * introFadeOut;
                hyperspaceGroup.visible = strength > 0.005;
                hyperspaceGroup.rotation.z = t * 0.55;
                hyperspaceSpeed = hyperspaceSpeed + ((strength > 0.55 ? 1.65 : 0.2) - hyperspaceSpeed) * 0.025;
                hyperspaceRings.forEach((ring, i) => {
                    ring.position.z += hyperspaceSpeed;
                    ring.rotation.z += 0.012 + (i % 3) * 0.004;
                    ring.material.opacity = strength * strength * (0.5 + (i % 3) * 0.18);
                    if (ring.position.z > -8) { ring.position.z = -150; ring.rotation.z = Math.random() * Math.PI * 2; }
                });
            }

            if (t > 0.8 && blackHoleMesh) {
                blackHoleMesh.visible = accretionMesh.visible = accretionMeshHalo.visible = accretionPoints.visible = true;
                const s = easeOutBack(Math.min(1, (t - 0.8) / 2.2));
                [blackHoleMesh, accretionMesh, accretionMeshHalo, accretionPoints].forEach(o => o.scale.setScalar(s));
            }
            if (t > 2.5 && points) {
                points.visible = true;
                const p = Math.min(1, (t - 2.5) / 4.5);
                points.rotation.y = t * (0.05 + (1-p) * 1.5);
                points.scale.setScalar(easeOutCubic(p));
            } else if (points) { points.rotation.y = t * 0.05; }

            if (t > 4.4 && jetPoints) {
                jetPoints.visible = true; jetPoints.material.opacity = 0.95;
                const heartT = t - 4.4;
                const pos = jetPoints.geometry.attributes.position.array;
                for (let i = 0; i < parameters.jetCount; i++) {
                    const i3 = i * 3, v = jetVelocities[i];
                    const localT = heartT - v.emergeDelay;
                    if (localT <= 0) { pos[i3]=0; pos[i3+1]=0; pos[i3+2]=0; continue; }
                    const p = Math.min(1, localT / v.emergeDuration);
                    const eased = 1 - Math.pow(1 - p, 3);
                    const beat = 1 + Math.sin(t * 2.2) * 0.04;
                    const wob  = Math.sin(t * v.freq + v.phase) * v.amp;
                    const fx = v.basePx * beat + Math.cos(v.phase) * wob * 0.3;
                    const fy = (v.basePy - 3.2) * beat + 3.2 + Math.sin(v.phase * 1.3) * wob * 0.3;
                    const fz = v.basePz + Math.sin(t * v.freq * 0.7 + v.phase) * 0.15;
                    const arcY = Math.sin(eased * Math.PI) * 0.6;
                    pos[i3] = fx * eased; pos[i3+1] = fy * eased + arcY * (1-eased); pos[i3+2] = fz * eased;
                }
                jetPoints.geometry.attributes.position.needsUpdate = true;
            }

            plateMeshes.forEach((d, i) => {
                if (t > 5.8 + i * 0.12) {
                    d.mesh.visible = true;
                    const localP = Math.min(1, (t - 5.8 - i * 0.12) / 1.8);
                    const eased  = easeOutCubic(localP);
                    const angle  = d.baseAngle + t * d.speed;
                    const fx = Math.cos(angle) * d.radius, fz = Math.sin(angle) * d.radius;
                    const fy = d.yOffset + Math.sin(t * 0.4 + d.wobblePhase) * 0.3 + Math.sin(angle) * d.tilt;
                    d.mesh.position.set(fx * eased, fy * eased, fz * eased);
                    setPlateScale(d.mesh, eased);
                    d.mesh.material.opacity = eased;
                    d.mesh.lookAt(camera.position);
                    d._intro = localP < 1;

                    if (d.gifEl) {
                        const wp = d.mesh.position.clone().project(camera);
                        const sx = ( wp.x * 0.5 + 0.5) * window.innerWidth;
                        const sy = (-wp.y * 0.5 + 0.5) * window.innerHeight;
                        const meshInCam = d.mesh.position.clone().applyMatrix4(camera.matrixWorldInverse);
                        const depth = -meshInCam.z;
                        const fadeAlpha = Math.max(0, Math.min(1, (depth + 3) / 3)) * eased;
                        if (fadeAlpha <= 0.05) {
                            d.gifEl.style.display = 'none';
                        } else {
                            d.gifEl.style.display = 'block';
                            d.gifEl.style.left    = sx + 'px';
                            d.gifEl.style.top     = sy + 'px';
                            d.gifEl.style.opacity = fadeAlpha;
                            const dist = camera.position.distanceTo(d.mesh.position);
                            const s = Math.max(55, Math.min(200, 140 * (6 / Math.max(dist, 0.1)))) * eased;
                            d.gifEl.style.width   = s + 'px';
                            d.gifEl.style.height  = s + 'px';
                        }
                    }
                } else {
                    if (d.gifEl) d.gifEl.style.display = 'none';
                }
            });

            textMeshes.forEach((tx, i) => {
                if (t > 7.0 + i * 0.08) {
                    tx.mesh.visible = true;
                    const localP = Math.min(1, (t - 7.0 - i * 0.08) / 1.8);
                    const eased  = easeOutCubic(localP);
                    const angle  = tx.baseAngle + t * tx.speed;
                    const fx = Math.cos(angle) * tx.radius, fz = Math.sin(angle) * tx.radius;
                    const fy = tx.yLevel + Math.sin(t * 0.3 + tx.phase) * 0.05;
                    tx.mesh.position.set(fx * eased, fy * eased, fz * eased);
                    tx.mesh.scale.setScalar(eased);
                    tx.mesh.material.opacity = (0.9 + Math.sin(t * 0.6 + tx.phase) * 0.1) * eased;
                    tx.mesh.lookAt(camera.position);
                    tx._intro = localP < 1;
                }
            });

            if (accretionPoints?.visible) accretionPoints.rotation.y = t * 2.0;
            if (accretionMesh?.visible)   accretionMesh.rotation.z   = t * 1.5;

                    colArr[i3]   = (0.9 + Math.sin(v.phase * 1.3) * 0.1) * flick;
                    colArr[i3+1] = (0.25 + Math.abs(Math.sin(v.phase)) * 0.25) * flick;

                const y = d.yOffset + Math.sin(t * 0.4 + d.wobblePhase) * 0.3 + Math.sin(angle) * d.tilt;

        function runConfetti() {
            const ctx = effectCanvas.getContext('2d');
            effectCanvas.width  = msgCard.offsetWidth;
            effectCanvas.height = msgCard.offsetHeight;
            const pieces = Array.from({length: 60}, () => ({
                x: Math.random() * effectCanvas.width,
                y: Math.random() * effectCanvas.height - effectCanvas.height,
                r: 4 + Math.random() * 6,
                d: 1.5 + Math.random() * 2.5,
                color: ['#ff69b4','#ff85c2','#ffadd4','#ff3399','#fff0f8','#e0a0ff'][Math.floor(Math.random()*6)],
                tilt: Math.random() * 360,
                tiltSpeed: 1 + Math.random() * 2,
                shape: Math.random() < 0.5 ? 'heart' : 'circle'
            }));
            const draw = () => {
                ctx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);
                pieces.forEach(p => {
                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.tilt * Math.PI/180);
                    ctx.fillStyle = p.color; ctx.globalAlpha = 0.85;
                    if (p.shape === 'heart') {
                        const s = p.r * 0.12;
                        ctx.beginPath();
                        for (let a = 0; a <= Math.PI*2; a += 0.05) {
                            const hx = 16*Math.pow(Math.sin(a),3)*s;
                            const hy = -(13*Math.cos(a)-5*Math.cos(2*a)-2*Math.cos(3*a)-Math.cos(4*a))*s;
                            a===0 ? ctx.moveTo(hx,hy) : ctx.lineTo(hx,hy);
                        }
                        ctx.fill();
                    } else {
                        ctx.beginPath(); ctx.arc(0, 0, p.r/2, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.restore();
                    p.y += p.d; p.tilt += p.tiltSpeed;
                    if (p.y > effectCanvas.height) {
                        p.y = -10; p.x = Math.random() * effectCanvas.width;
                    }
                });
                effectRAF = requestAnimationFrame(draw);
            };
            draw();
        }

        function runStars() {
            const ctx = effectCanvas.getContext('2d');
            effectCanvas.width  = msgCard.offsetWidth;
            effectCanvas.height = msgCard.offsetHeight;
            const stars = Array.from({length: 40}, () => ({
                x: Math.random() * effectCanvas.width,
                y: Math.random() * effectCanvas.height,
                size: 1 + Math.random() * 3,
                speed: 0.5 + Math.random() * 1.5,
                opacity: Math.random(),
                twinkleSpeed: 0.02 + Math.random() * 0.04,
                color: ['#ffffff','#ffadd4','#e0c0ff','#fff0f8'][Math.floor(Math.random()*4)]
            }));
            const shoots = Array.from({length: 4}, () => ({
                x: Math.random() * effectCanvas.width, y: 0,
                len: 60 + Math.random() * 80, speed: 4 + Math.random() * 4,
                angle: Math.PI/4 + (Math.random()-0.5)*0.3, opacity: 0, delay: Math.random() * 120
            }));
            let frame = 0;
            const draw = () => {
                ctx.clearRect(0, 0, effectCanvas.width, effectCanvas.height);
                stars.forEach(s => {
                    s.opacity += s.twinkleSpeed * (s.opacity > 1 ? -1 : s.opacity < 0 ? 1 : (Math.random() > 0.5 ? 1 : -1));
                    s.opacity = Math.max(0.1, Math.min(1, s.opacity));
                    ctx.globalAlpha = s.opacity * 0.7;
                    ctx.fillStyle = s.color;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                });
                shoots.forEach(sh => {
                    if (frame < sh.delay) return;
                    sh.x += Math.cos(sh.angle) * sh.speed;
                    sh.y += Math.sin(sh.angle) * sh.speed;
                    sh.opacity = Math.min(1, (frame - sh.delay) / 20);
                    const grad = ctx.createLinearGradient(sh.x, sh.y, sh.x - Math.cos(sh.angle)*sh.len, sh.y - Math.sin(sh.angle)*sh.len);
                    grad.addColorStop(0, `rgba(255,220,240,${sh.opacity})`);
                    grad.addColorStop(1, 'rgba(255,150,200,0)');
                    ctx.globalAlpha = 1; ctx.strokeStyle = grad; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(sh.x, sh.y);
                    ctx.lineTo(sh.x - Math.cos(sh.angle)*sh.len, sh.y - Math.sin(sh.angle)*sh.len);
                    ctx.stroke();
                    if (sh.x > effectCanvas.width || sh.y > effectCanvas.height) {
                        sh.x = Math.random() * effectCanvas.width * 0.5;
                        sh.y = 0; sh.delay = frame + Math.random() * 60;
                    }
                });
                ctx.globalAlpha = 1;
                frame++;
                effectRAF = requestAnimationFrame(draw);
            };
            draw();
        }

        function openJigsaw(plate) {
            jigsawReveal.style.display = 'none';

            jigsawProgress.textContent = '0 / 9 pieces';
            jigsawOverlay.classList.add('show');

            document.getElementById('jigsaw-cancel-btn').style.display = 'inline-block';

            const COLS = 3, ROWS = 3;
            const PIECE_W = 130, PIECE_H = 130;
            const TAB = Math.round(PIECE_W * 0.22);
            const CANVAS_W = PIECE_W + TAB * 2, CANVAS_H = PIECE_H + TAB * 2;
            const BOARD_W = PIECE_W * COLS;
            const BOARD_H = PIECE_H * ROWS;
            jigsawBoard.style.width  = BOARD_W + 'px';
            jigsawBoard.style.height = BOARD_H + 'px';
            jigsawBoard.style.background = 'rgba(20,0,15,0.8)';

            const ghost = document.createElement('img');
            ghost.id = 'jigsaw-board-ghost';
            ghost.src = 'dada4.jpg?v=1';
            jigsawBoard.appendChild(ghost);

            const gridCanvas = document.createElement('canvas');
            gridCanvas.width = BOARD_W; gridCanvas.height = BOARD_H;
            gridCanvas.style.cssText = 'position:absolute;inset:0;pointer-events:none;';
            const gc = gridCanvas.getContext('2d');
            gc.strokeStyle = 'rgba(255,105,180,0.25)'; gc.lineWidth = 1;
            for (let c = 1; c < COLS; c++) { gc.beginPath(); gc.moveTo(c*PIECE_W,0); gc.lineTo(c*PIECE_W,BOARD_H); gc.stroke(); }
            for (let r = 1; r < ROWS; r++) { gc.beginPath(); gc.moveTo(0,r*PIECE_H); gc.lineTo(BOARD_W,r*PIECE_H); gc.stroke(); }
            jigsawBoard.appendChild(gridCanvas);

            // shared tab direction per interior edge so neighboring pieces' knobs interlock visually
            const vSign = Array.from({length: ROWS}, () => Array.from({length: COLS + 1}, () => Math.random() < 0.5 ? 1 : -1));
            const hSign = Array.from({length: ROWS + 1}, () => Array.from({length: COLS}, () => Math.random() < 0.5 ? 1 : -1));

            function addEdge(path, x1, y1, x2, y2, sign) {
                if (!sign) { path.lineTo(x2, y2); return; }
                const dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy);
                const ux = dx / len, uy = dy / len, px = -uy, py = ux;
                const bulge = TAB * sign;
                const pt = t => [x1 + ux * len * t, y1 + uy * len * t];
                const [ax, ay] = pt(0.35), [bx, by] = pt(0.5), [cx, cy] = pt(0.65);
                path.lineTo(ax, ay);
                path.bezierCurveTo(ax + px*bulge*0.7, ay + py*bulge*0.7, bx - ux*len*0.15 + px*bulge, by - uy*len*0.15 + py*bulge, bx + px*bulge, by + py*bulge);
                path.bezierCurveTo(bx + ux*len*0.15 + px*bulge, by + uy*len*0.15 + py*bulge, cx + px*bulge*0.7, cy + py*bulge*0.7, cx, cy);
                path.lineTo(x2, y2);
            }

            function piecePath(top, right, bottom, left) {
                const p = new Path2D();
                const x0 = TAB, y0 = TAB, x1 = TAB + PIECE_W, y1 = TAB + PIECE_H;
                p.moveTo(x0, y0);
                addEdge(p, x0, y0, x1, y0, top);
                addEdge(p, x1, y0, x1, y1, right);
                addEdge(p, x1, y1, x0, y1, bottom);
                addEdge(p, x0, y1, x0, y0, left);
                p.closePath();
                return p;
            }

            const img = new Image();
                img.src = 'dada4.jpg?v=1';
                img.onload = () => {
                let locked = 0;
                const SNAP = 26;
                const scatterPad = 55;
                const scale = (img.width / COLS) / PIECE_W;
                const pieces = [];

                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const sx = c * (img.width  / COLS);
                        const sy = r * (img.height / ROWS);
                        const sw = img.width  / COLS;
                        const sh = img.height / ROWS;

                        const top    = r === 0        ? 0 :  hSign[r][c];
                        const bottom = r === ROWS - 1 ? 0 : -hSign[r+1][c];
                        const left   = c === 0        ? 0 :  vSign[r][c];
                        const right  = c === COLS - 1 ? 0 : -vSign[r][c+1];
                        const path = piecePath(top, right, bottom, left);

                        const cvs = document.createElement('canvas');
                        cvs.width = CANVAS_W; cvs.height = CANVAS_H;
                        const ctx = cvs.getContext('2d');
                        ctx.save();
                        ctx.clip(path);
                        ctx.drawImage(img, sx - TAB*scale, sy - TAB*scale, sw + TAB*2*scale, sh + TAB*2*scale, 0, 0, CANVAS_W, CANVAS_H);
                        ctx.restore();
                        ctx.lineWidth = 2;
                        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                        ctx.stroke(path);

                        const el = cvs;
                        el.className = 'jigsaw-piece';
                        el.setAttribute('data-sx', sx);
                        el.setAttribute('data-sy', sy);
                        el.style.width  = CANVAS_W + 'px';
                        el.style.height = CANVAS_H + 'px';

                        const targetX = c * PIECE_W - TAB;
                        const targetY = r * PIECE_H - TAB;

                        const bx = -scatterPad + Math.random() * (BOARD_W + scatterPad*2 - PIECE_W);
                        const by = -scatterPad + Math.random() * (BOARD_H + scatterPad*2 - PIECE_H);
                        el.style.left = (bx - TAB) + 'px';
                        el.style.top  = (by - TAB) + 'px';
                        el.style.zIndex = 10;
                        el.style.transform = `rotate(${(Math.random()*30 - 15).toFixed(1)}deg)`;

                        let isLocked = false;

                        const onDown = (ex, ey) => {
                            if (isLocked) return;
                            el.style.transform = 'rotate(0deg)';
                            const rect = jigsawBoard.getBoundingClientRect();
                            let dx = ex - (rect.left + parseFloat(el.style.left || 0));
                            let dy = ey - (rect.top + parseFloat(el.style.top || 0));
                            el.style.zIndex = 100;

                            const onMove = (mx, my) => {
                                el.style.left = (mx - rect.left - dx) + 'px';
                                el.style.top  = (my - rect.top - dy) + 'px';
                            };
                            const moveM = e => onMove(e.clientX, e.clientY);
                            const moveT = e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); };
                            const up = () => {
                                el.style.zIndex = 10;
                                const cx = parseFloat(el.style.left);
                                const cy = parseFloat(el.style.top);
                                if (Math.abs(cx - targetX) < SNAP && Math.abs(cy - targetY) < SNAP) {
                                    el.style.left = targetX + 'px';
                                    el.style.top  = targetY + 'px';
                                    el.style.zIndex = 5;
                                    el.classList.add('locked', 'snap-anim');
                                    isLocked = true;
                                    locked++;
                                    jigsawProgress.textContent = `${locked} / 9 pieces`;
                                    if (locked === ROWS * COLS) onComplete();
                                }
                                document.removeEventListener('mousemove', moveM);
                                document.removeEventListener('mouseup', up);
                                document.removeEventListener('touchmove', moveT);
                                document.removeEventListener('touchend', up);
                            };
                            document.addEventListener('mousemove', moveM);
                            document.addEventListener('mouseup', up);
                            document.addEventListener('touchmove', moveT, { passive: false });
                            document.addEventListener('touchend', up);
                        };
                        el.addEventListener('mousedown',  e => { e.preventDefault(); onDown(e.clientX, e.clientY); });
                        el.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });

                        jigsawBoard.appendChild(el);
                        pieces.push(el);
                    }
                }

                function onComplete() {
                    jigsawRevTitle.textContent = plate.name;
                    jigsawRevText.textContent  = plate.message;
                    jigsawReveal.style.display = 'block';
                    jigsawReveal.style.animation = 'cardFloat 4s ease-in-out infinite';
                    jigsawProgress.textContent = '🎉 All done!';

                    document.getElementById('jigsaw-cancel-btn').style.display = 'none';

                    pieces.forEach(p => {
                        p.style.filter = 'none';
                        const pCtx = p.getContext('2d');
                        const sx = parseInt(p.getAttribute('data-sx'));
                        const sy = parseInt(p.getAttribute('data-sy'));
                        const sw = img.width  / COLS;
                        const sh = img.height / ROWS;
                        pCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
                        pCtx.save();
                        pCtx.beginPath();
                        pCtx.rect(TAB, TAB, PIECE_W, PIECE_H);
                        pCtx.clip();
                        pCtx.drawImage(img, sx, sy, sw, sh, TAB, TAB, PIECE_W, PIECE_H);
                        pCtx.restore();
                    });
                    if (gridCanvas) gridCanvas.style.display = 'none';
                    if (ghost) ghost.style.display = 'none';

                    runJigsawConfetti();
                }
            };
            img.onerror = () => {
                console.error('dada4.jpg load failed, using fallback');
                img.dispatchEvent(new Event('load'));
            };
        }

            frevLine1.textContent = lines[0] || '';
            frevLine2.textContent = lines[1] || '';
            [frevEmoji, frevLine1, frevLine2, frevClose].forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(12px)';
            });
            fortuneRevealOverlay.classList.add('show');
            const els = [frevEmoji, frevLine1, frevLine2, frevClose];
            els.forEach((el, i) => {
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 200 + i * 220);
            });
        }

        const FORTUNE_POOL = [
            { emoji: '☕', text: 'Coffee or tea\nperson?', hue: 30 },
            { emoji: '🌊', text: 'Beach or\nmountains?', hue: 190 },
            { emoji: '🌙', text: 'Morning person\nor night owl?', hue: 250 },
            { emoji: '🍜', text: 'What\'s your\ncomfort food?', hue: 15 },
            { emoji: '📚', text: 'Introvert or\nextrovert?', hue: 270 },
            { emoji: '🎵', text: 'What song\'s stuck\nin your head?', hue: 320 },
            { emoji: '✈️', text: 'One place on your\nbucket list?', hue: 200 },
            { emoji: '😊', text: 'What made you\nsmile today?', hue: 340 },
            { emoji: '🎨', text: 'Your favorite way\nto relax?', hue: 160 },
            { emoji: '🎲', text: 'Tell me a random\nfun fact', hue: 285 },
            { emoji: '🐾', text: 'Cats or\ndogs?', hue: 25 },
            { emoji: '🍿', text: 'Favorite movie\nof all time?', hue: 355 },
        ];

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length-1; i > 0; i--) {
                const j = Math.floor(Math.random()*(i+1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function openFortune() {
            fortuneCards.innerHTML = '';
            fortuneReplay.style.display = 'none';
            fortuneRevealOverlay.classList.remove('show');
            if (shakeInterval) { clearInterval(shakeInterval); shakeInterval = null; }
            fortuneOverlay.classList.add('show');

            const count = 5;
            const selected = shuffle(FORTUNE_POOL).slice(0, count);
            let opened = false;
            const cardEls = [];

            selected.forEach((card, i) => {
                const el = document.createElement('div');
                el.className = 'fortune-card';
                el.style.setProperty('--card-hue', card.hue ?? 330);
                el.innerHTML = `
                    <div class="fortune-card-inner">
                        <div class="fortune-back">
                            <div class="fortune-back-pattern">❓</div>
                        </div>
                        <div class="fortune-front">
                            <div class="fortune-label">Ice Breaker</div>
                            <div class="fortune-emoji">${card.emoji}</div>
                        </div>
                    </div>`;

                el.addEventListener('mousemove', e => {
                    if (opened || el.classList.contains('flipped') || el.classList.contains('disabled')) return;
                    const r = el.getBoundingClientRect();
                    const x = (e.clientX - r.left) / r.width  - 0.5;
                    const y = (e.clientY - r.top)  / r.height - 0.5;
                    el.querySelector('.fortune-card-inner').style.transform =
                        `rotateY(${x*30}deg) rotateX(${-y*20}deg) translateY(-8px)`;
                });
                el.addEventListener('mouseleave', () => {
                    if (!el.classList.contains('flipped'))
                        el.querySelector('.fortune-card-inner').style.transform = '';
                });

                el.addEventListener('click', () => {
                    if (opened || el.classList.contains('disabled')) return;
                    opened = true;
                    if (shakeInterval) { clearInterval(shakeInterval); shakeInterval = null; }
                    const inner = el.querySelector('.fortune-card-inner');
                    inner.style.transform = '';
                    requestAnimationFrame(() => { el.classList.add('flipped'); });
                    setTimeout(() => {
                        cardEls.forEach(c => { if (c !== el) c.classList.add('disabled'); });
                        fortuneReplay.style.display = 'block';
                        showReveal(card);
                    }, 700);
                });

                el.style.opacity = '0';
                el.style.transform = 'translateY(30px)';
                el.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                fortuneCards.appendChild(el);
                cardEls.push(el);
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 80 * i);
            });

            let shakeIdx = 0;
            shakeInterval = setInterval(() => {
                if (opened) { clearInterval(shakeInterval); return; }
                const target = cardEls[Math.floor(Math.random() * cardEls.length)];
                if (!target || target.classList.contains('flipped')) return;
                target.classList.add('shaking');
                setTimeout(() => target.classList.remove('shaking'), 500);
            }, 1200);
        }

        fortuneReplay.addEventListener('click', openFortune);
        fortuneClose.addEventListener('click', () => {
            if (shakeInterval) { clearInterval(shakeInterval); shakeInterval = null; }
            fortuneOverlay.classList.remove('show');
            fortuneRevealOverlay.classList.remove('show');
        });

        function showPlateMessage(plate, idx) {
            stopEffect();
            titleEl.textContent = plate.name;

            if (plate.effect && plate.src) {
                stickerWrap.style.display = 'block';
                stickerGif.src = plate.src;
                imgWrap.style.display = 'none';
            } else {
                stickerWrap.style.display = 'none';
                imgWrap.style.display = '';

                if (plate.popupSrc) {
                    msgImg.src = plate.popupSrc + '?v=' + Date.now();
                    msgImgBg.src = plate.popupSrc + '?v=' + Date.now();
                } else if (plate.src) {
                    msgImg.src = plate.src; msgImgBg.src = plate.src;
                } else {
                    const cvs = window.makePlateCanvas(plate, idx * 137, 512);
                    msgImg.src = cvs.toDataURL(); msgImgBg.src = cvs.toDataURL();
                }
            }

            if (plate.effect === 'typewriter') {
                textEl.textContent = '';
                msgCard.classList.add('effect-typewriter');
                overlay.classList.add('show');
                runTypewriter(plate.message);
            } else if (plate.effect === 'letter') {
                msgCard.classList.add('effect-letter');
                overlay.classList.add('show');
                runTypewriter(plate.message);
            } else if (plate.effect === 'jigsaw') {
                openJigsaw(plate);
            } else if (plate.effect === 'confetti') {
                textEl.textContent = plate.message;
                msgCard.classList.add('effect-confetti');
                overlay.classList.add('show');
                setTimeout(runConfetti, 300);
            } else if (plate.effect === 'stars') {
                textEl.textContent = plate.message;
                msgCard.classList.add('effect-stars');
                overlay.classList.add('show');
                setTimeout(runStars, 300);
            } else if (plate.effect === 'fortune') {
                openFortune();
            } else if (plate.effect === 'timer') {
                textEl.textContent = plate.message;
                countdownWrap.style.display = 'block';
                overlay.classList.add('show');
                startCountdown();
            } else {
                textEl.textContent = plate.message;
                overlay.classList.add('show');
            }
        }

        closeBtn.addEventListener('click', () => { stopEffect(); overlay.classList.remove('show'); });
        overlay.addEventListener('click', e => { if (e.target === overlay) { stopEffect(); overlay.classList.remove('show'); } });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') { stopEffect(); overlay.classList.remove('show'); } });

        function runJigsawConfetti() {
            const c = document.createElement('canvas');
            c.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;';
            document.body.appendChild(c);
            const ctx = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;

            const pCount = 120;
            const colors = ['#ff69b4', '#ff3399', '#ff85c2', '#fff0f8', '#e0a0ff', '#33ccff', '#ffff66'];
            const p = Array.from({length: pCount}, () => {
                const angle = Math.random() * Math.PI * 2;
                const speed = 4 + Math.random() * 7;
                return {
                    x: c.width / 2,
                    y: c.height / 2 + 50,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - (3 + Math.random() * 4),
                    r: 4 + Math.random() * 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    opacity: 1,
                    gravity: 0.18,
                    tilt: Math.random() * 360,
                    tiltSpeed: 2 + Math.random() * 4
                };
            });

            function draw() {
                ctx.clearRect(0, 0, c.width, c.height);
                let alive = false;
                p.forEach(part => {
                    if (part.opacity <= 0) return;
                    alive = true;
                    ctx.save(); ctx.translate(part.x, part.y); ctx.rotate(part.tilt * Math.PI / 180);
                    ctx.fillStyle = part.color; ctx.globalAlpha = part.opacity;
                    if (part.r > 6) {
                        const s = part.r * 0.15; ctx.beginPath();
                        for (let a = 0; a <= Math.PI*2; a += 0.1) {
                            const hx = 16 * Math.pow(Math.sin(a), 3) * s;
                            const hy = -(13*Math.cos(a) - 5*Math.cos(2*a) - 2*Math.cos(3*a) - Math.cos(4*a)) * s;
                            a === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
                        }
                        ctx.fill();
                    } else {
                        ctx.beginPath(); ctx.arc(0, 0, part.r, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.restore();
                    part.x += part.vx; part.y += part.vy; part.vy += part.gravity; part.tilt += part.tiltSpeed; part.opacity -= 0.008;
                });
                if (alive) requestAnimationFrame(draw); else c.remove();
            }
            draw();
        }
    </script>

    <script>
        (function () {
            const music        = document.getElementById('backgroundMusic');
            const musicBtn     = document.getElementById('musicBtn');
            const playIcon     = document.getElementById('playIcon');
            const pauseIcon    = document.getElementById('pauseIcon');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeControl = document.getElementById('volumeControl');
            if (!music || !musicBtn || !volumeSlider || !volumeControl) return;

            let hideVolumeTimeout = null;
            music.volume = 0.5;

            window.addEventListener('experienceStarted', function () {
                if (!music.paused) {
                    playIcon.style.display  = 'none';
                    pauseIcon.style.display = 'block';
                } else {
                    music.play().then(function () {
                        playIcon.style.display  = 'none';
                        pauseIcon.style.display = 'block';
                    }).catch(function () {
                        playIcon.style.display  = 'block';
                        pauseIcon.style.display = 'none';
                    });
                }
            });

            musicBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                if (music.paused) {
                    music.play().then(function () {
                        playIcon.style.display  = 'none';
                        pauseIcon.style.display = 'block';
                    }).catch(function () {});
                } else {
                    music.pause();
                    playIcon.style.display  = 'block';
                    pauseIcon.style.display = 'none';
                }
                if (!volumeControl.classList.contains('visible')) {
                    volumeControl.classList.add('visible');
                    clearTimeout(hideVolumeTimeout);
                    hideVolumeTimeout = setTimeout(function () { volumeControl.classList.remove('visible'); }, 2000);
                } else {
                    volumeControl.classList.remove('visible');
                }
            });

            volumeSlider.addEventListener('input', function (e) {
                music.volume = e.target.value;
                clearTimeout(hideVolumeTimeout);
                volumeControl.classList.add('visible');
            });
            volumeSlider.addEventListener('change', function () {
                hideVolumeTimeout = setTimeout(function () { volumeControl.classList.remove('visible'); }, 2000);
            });
            volumeControl.addEventListener('mouseenter', function () { clearTimeout(hideVolumeTimeout); });
            volumeControl.addEventListener('mouseleave', function () {
                hideVolumeTimeout = setTimeout(function () { volumeControl.classList.remove('visible'); }, 2000);
            });
            volumeSlider.addEventListener('touchstart', function (e) { e.stopPropagation(); clearTimeout(hideVolumeTimeout); });
            volumeSlider.addEventListener('touchend', function () {
                hideVolumeTimeout = setTimeout(function () { volumeControl.classList.remove('visible'); }, 2000);
            });
            document.addEventListener('click', function (e) {
                if (!volumeControl.contains(e.target) && !musicBtn.contains(e.target)) {
                    volumeControl.classList.remove('visible');
                    clearTimeout(hideVolumeTimeout);
                }
            });
        })();
    </script>
</body>
